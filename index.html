<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ProofCheck — Annual General Meeting</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f7f4;--card:#fff;--border:#e2ddd6;--ink:#1c1917;--muted:#78716c;--light:#f5f3ef;
  --blue:#1d6a9e;--blue-bg:#eef5fb;--blue-border:#b8d8f0;
  --red:#c0392b;--red-bg:#fdf2f1;--red-border:#f5c6c3;
  --amber:#b7590a;--amber-bg:#fef6ed;--amber-border:#fcd9b0;
  --green:#1a6640;--green-bg:#edf6f1;--green-border:#a8dabb;
  --accent:#1c3f6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
button,input,textarea{font-family:inherit}

.topbar{background:var(--accent);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px}
.tl{display:flex;align-items:center;gap:10px}
.tl-icon{width:30px;height:30px;background:rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px}
.tl-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.tl-sub{font-size:10px;opacity:0.55;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.t-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 12px;font-size:10px}
.main{max-width:820px;margin:0 auto;padding:28px 20px 60px}

/* MODE */
.mode-screen{display:flex;flex-direction:column;align-items:center;padding:52px 20px}
.mode-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--accent);margin-bottom:6px}
.mode-sub{color:var(--muted);font-size:13px;margin-bottom:44px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:580px}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:32px 22px;cursor:pointer;transition:all 0.2s;text-align:center;user-select:none}
.mode-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 24px rgba(29,106,158,0.12)}
.mc-icon{font-size:34px;margin-bottom:12px}
.mc-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--accent);margin-bottom:6px}
.mc-desc{font-size:12px;color:var(--muted);line-height:1.6}
.mc-tag{display:inline-block;margin-top:12px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.tag-fd{background:var(--blue-bg);color:var(--blue)}
.tag-cr{background:var(--amber-bg);color:var(--amber)}

/* UPLOAD */
.upload-screen{max-width:700px;margin:0 auto}
.upload-h{margin-bottom:22px}
.upload-h h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);margin-bottom:4px}
.upload-h p{color:var(--muted);font-size:12px}

/* API KEY */
.api-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.api-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.api-lbl span{color:var(--green);font-weight:500;font-size:10px;text-transform:none;letter-spacing:0}
.api-row{display:flex;gap:8px}
.api-input{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--light);color:var(--ink);font-size:12px;outline:none;font-family:'IBM Plex Mono',monospace}
.api-input:focus{border-color:var(--blue)}
.api-toggle{padding:8px 13px;border:1px solid var(--border);border-radius:7px;background:var(--light);color:var(--muted);font-size:12px;cursor:pointer}
.api-hint{font-size:11px;color:var(--muted);margin-top:7px}
.api-hint a{color:var(--blue);font-weight:600;text-decoration:none}

.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.upload-box{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:26px 16px;text-align:center;cursor:pointer;transition:all 0.2s;user-select:none;-webkit-user-select:none}
.upload-box:hover{border-color:var(--blue);background:var(--blue-bg)}
.upload-box.filled{border-color:var(--green);border-style:solid;background:var(--green-bg)}
.ub-icon{font-size:26px;margin-bottom:8px}
.ub-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.ub-hint{font-size:11px;color:var(--muted)}
.ub-name{font-size:11px;color:var(--green);font-weight:600;margin-top:5px;word-break:break-all}
.ub-change{font-size:10px;color:var(--muted);margin-top:2px}

.ci-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.ci-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.ci-ta{width:100%;min-height:54px;padding:9px;background:var(--light);border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--ink);resize:vertical;outline:none}
.ci-ta:focus{border-color:var(--blue)}

.run-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.run-btn:hover{background:#16325a}
.run-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.back-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:6px 13px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:20px;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.back-btn:hover{border-color:var(--blue);color:var(--blue)}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;font-weight:500}
.load-sub{font-size:12px;color:var(--muted)}
.load-steps{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.load-step{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background 0.3s}
.sdot.on{background:var(--blue)}

/* ERROR SCREEN */
.err-box{background:var(--red-bg);border:1px solid var(--red-border);border-left:3px solid var(--red);border-radius:9px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--red)}

/* REPORT */
.rpt-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.rpt-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mode-pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--blue-border);border-left:3px solid var(--blue);border-radius:6px;padding:6px 12px;font-size:12px}
.mp-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.mp-lbl{font-weight:600;color:var(--accent)}
.mp-meta{color:var(--muted);font-size:11px}
.toggle-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s}
.toggle-btn:hover,.toggle-btn.on{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}

/* SUMMARY */
.summary-bar{display:flex;gap:10px;margin-bottom:18px}
.sb{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.sb-e{border-left:3px solid var(--red)}
.sb-q{border-left:3px solid var(--blue)}
.sb-s{border-left:3px solid var(--amber)}
.sb-num{font-size:26px;font-weight:700;line-height:1}
.ne{color:var(--red)}.nq{color:var(--blue)}.ns{color:var(--amber)}
.sb-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.sb-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:18px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-weight:600}
.leg-hint{margin-left:auto;font-size:10px;opacity:0.7}

/* SECTIONS */
.rpt-section{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-hdr{padding:13px 16px;display:flex;align-items:center;gap:10px}
.sec-icon{font-size:15px}
.sec-name{font-weight:600;font-size:13px;color:var(--accent);flex:1}
.sec-counts{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sc{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.sc-e{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.sc-q{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.sc-s{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.sc-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);font-size:11px}

/* ISSUE ROWS */
.issue-row{border-top:1px solid var(--border);cursor:pointer;transition:background 0.12s}
.issue-row:hover,.issue-row.open{background:var(--light)}
.ir-top{display:flex;align-items:center;gap:9px;padding:10px 16px}
.ir-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ird-e{background:var(--red)}.ird-q{background:var(--blue)}.ird-s{background:var(--amber)}
.ir-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:4px;flex-shrink:0}
.irb-e{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.irb-q{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.irb-s{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.ir-desc{font-size:12px;color:var(--ink);flex:1;line-height:1.4}
.ir-arr{font-size:10px;color:var(--muted);transition:transform 0.2s;flex-shrink:0}
.ir-arr.open{transform:rotate(180deg)}
.ir-body{padding:0 16px 13px 33px;border-top:1px dashed var(--border)}
.ir-compare{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:7px;padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.9;margin-top:10px}
.cr{display:flex;gap:10px;align-items:baseline}
.cr-doc{min-width:68px;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.5px;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;flex-shrink:0}
.cr-val{color:var(--ink);white-space:pre-wrap}
.cr-val.bad{color:var(--red);font-weight:600}
.cr-val.ok{color:var(--green);font-weight:600}
.cr-val.query{color:var(--blue);font-weight:600}

/* NOTES & HISTORY */
.note-sec,.hist-sec{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px}
.sec-lbl-row{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-lbl-row::after{content:'';flex:1;height:1px;background:var(--border)}
.note-ta{width:100%;min-height:58px;padding:9px 11px;background:var(--light);border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--ink);resize:vertical;outline:none;line-height:1.6}
.note-ta:focus{border-color:var(--blue)}
.note-ta::placeholder{color:var(--muted);opacity:0.55}
.note-add{margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.note-add:hover{background:#16325a}
.note-saved{margin-top:8px;background:var(--blue-bg);border-left:3px solid var(--blue);border-radius:5px;padding:8px 10px;font-size:12px;color:var(--ink)}
.ns-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.hist-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-tag{background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;flex-shrink:0;margin-top:2px}
.hist-txt{font-size:12px;color:var(--ink);line-height:1.5}
.hist-time{font-size:10px;color:var(--muted);margin-top:1px}

@media(max-width:580px){.mode-cards,.upload-grid{grid-template-columns:1fr}.summary-bar{flex-direction:column}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <div class="tl-icon">📋</div>
    <div>
      <div class="tl-name">ProofCheck — Annual General Meeting</div>
      <div class="tl-sub">Smart Proofreading Tool</div>
    </div>
  </div>
  <div class="t-badge">PROTOTYPE v1.0</div>
</div>
<div class="main" id="root"></div>
<input type="file" id="fi1" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.txt" style="display:none"/>
<input type="file" id="fi2" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.txt" style="display:none"/>

<script>
const $=id=>document.getElementById(id);

const S={
  screen:'mode', mode:null,
  f1:null, f2:null,
  apiKey: localStorage.getItem('proofcheck_groq_key')||'',
  showKey:false,
  changeInstr:'',
  notes:[], open:{}, showDoc:false,
  report:null, error:null,
  loadStep:0, loadMsg:'',
};

const SECTION_DEFS=[
  {id:'header',     icon:'🏷️', name:'Header / Identification'},
  {id:'meeting',    icon:'📅', name:'Meeting Details'},
  {id:'agenda',     icon:'📋', name:'Agenda / Proposals'},
  {id:'directors',  icon:'👥', name:'Director Nominees'},
  {id:'voting',     icon:'🗳️', name:'Voting Options'},
  {id:'materials',  icon:'📎', name:'Meeting Materials'},
  {id:'other',      icon:'📌', name:'Other'},
];

// ── File reading ───────────────────────────────────────────────────────────────
function readFileAsText(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsText(file);
  });
}

function readFileAsBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function extractText(file){
  const type=file.type;
  if(type==='text/plain'||file.name.endsWith('.txt')){
    return await readFileAsText(file);
  }
  // For PDF/image/Word — return filename info, Groq will reason from context
  return `[File: ${file.name} — Type: ${type||'unknown'} — Size: ${Math.round(file.size/1024)}KB]`;
}

// ── Groq API call ──────────────────────────────────────────────────────────────
async function callGroq(prompt){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${S.apiKey.trim()}`
    },
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile',
      messages:[{role:'user',content:prompt}],
      temperature:0.1,
      max_tokens:3000
    })
  });
  if(!res.ok){
    const e=await res.json().catch(()=>({}));
    throw new Error(e?.error?.message||`Groq API error: ${res.status}`);
  }
  const data=await res.json();
  return data.choices?.[0]?.message?.content||'';
}

// ── Build prompt ───────────────────────────────────────────────────────────────
function buildPrompt(text1, text2, mode, changeInstr){
  const isFD = mode==='firstdraft';
  const sections = SECTION_DEFS.filter(s=>s.id!=='other').map(s=>s.id).join(', ');

  const rules = isFD ? `
CROSS-DOCUMENT RULES (both documents must match exactly):
- Job number must be identical in both documents everywhere it appears
- Company name must be identical in both documents
- Meeting date, time and location must be identical in both documents
- Director names must be spelled identically in both documents
- Proposal text must match between both documents
- Voting options (FOR/AGAINST/ABSTAIN/WITHHOLD) must be consistent
- Meeting materials list (Notice, Proxy Statement, Form 10-K etc) must match exactly
` : `
CHANGE ROUND RULES:
- Client instruction: "${changeInstr||'Check all changes were applied correctly'}"
- Verify the requested change was applied everywhere in the document
- Check nothing else accidentally changed
- Flag if change was applied inconsistently
`;

  return `You are a professional proofreader specialising in AGM (Annual General Meeting) documents — specifically Proxy Cards and Notice & Access documents.

DOCUMENT 1 ${isFD?'(Proxy Card)':'(Updated Document)'}:
${text1.substring(0,5000)}

DOCUMENT 2 ${isFD?'(Notice & Access)':'(Markup / Change Instructions)'}:
${text2.substring(0,5000)}

MODE: ${isFD?'First Draft Check — compare both documents':'Change Round — verify changes applied correctly'}

${rules}

IMPORTANT:
- Only report issues that actually exist in the documents provided above
- Do NOT invent issues that are not present in the text
- If a section has no issues, leave its issues array empty
- Separate ERRORS (definite mistakes that must be fixed) from QUERIES (style/format questions needing client decision) from SUGGESTIONS (best practice notes)

Classify each issue into one of these sections: ${sections}

Return ONLY valid JSON, no markdown, no explanation:
{
  "doc1_name": "<detected document name or type>",
  "doc2_name": "<detected document name or type>",
  "job_number": "<job number if found, else null>",
  "company": "<company name if found, else null>",
  "meeting_date": "<meeting date if found, else null>",
  "summary": {"errors": 0, "queries": 0, "suggestions": 0},
  "sections": {
    "header":    {"issues": []},
    "meeting":   {"issues": []},
    "agenda":    {"issues": []},
    "directors": {"issues": []},
    "voting":    {"issues": []},
    "materials": {"issues": []},
    "other":     {"issues": []}
  }
}

Each issue object:
{
  "type": "error" | "query" | "suggest",
  "desc": "<one clear sentence describing the issue>",
  "detail": [
    {"doc": "<label>", "val": "<value>", "cls": "bad|ok|query|"},
    {"doc": "<label>", "val": "<value>", "cls": "bad|ok|query|"}
  ]
}`;
}

// ── Run analysis ───────────────────────────────────────────────────────────────
async function runAnalysis(){
  S.error=null; S.report=null; S.open={};

  setLoadStep(0,'📂 Reading uploaded documents...');
  const text1=await extractText(S.f1);
  const text2=await extractText(S.f2);

  setLoadStep(1,'🔍 Extracting fields from documents...');
  await delay(400);

  setLoadStep(2,'⚖️ Comparing documents with AI...');
  const prompt=buildPrompt(text1, text2, S.mode, S.changeInstr);

  setLoadStep(3,'🏷️ Classifying errors and queries...');
  const raw=await callGroq(prompt);

  setLoadStep(4,'📋 Building report...');
  await delay(300);

  const clean=raw.replace(/```json|```/g,'').trim();
  const result=JSON.parse(clean);

  // Recalculate summary from actual issues
  let errs=0,qs=0,sugs=0;
  Object.values(result.sections).forEach(sec=>{
    (sec.issues||[]).forEach(i=>{
      if(i.type==='error') errs++;
      else if(i.type==='query') qs++;
      else sugs++;
    });
  });
  result.summary={errors:errs,queries:qs,suggestions:sugs};
  return result;
}

function setLoadStep(n,msg){
  S.loadStep=n; S.loadMsg=msg; render();
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

// ── Render helpers ─────────────────────────────────────────────────────────────
function secBadges(issues){
  const e=issues.filter(i=>i.type==='error').length;
  const q=issues.filter(i=>i.type==='query').length;
  const s=issues.filter(i=>i.type==='suggest').length;
  if(!e&&!q&&!s) return `<span class="sc sc-ok">✅ All clear</span>`;
  return (e?`<span class="sc sc-e">🔴 ${e} Error${e>1?'s':''}</span>`:'')
        +(q?`<span class="sc sc-q">🔵 ${q} Quer${q>1?'ies':'y'}</span>`:'')
        +(s?`<span class="sc sc-s">🟡 ${s} Tip${s>1?'s':''}</span>`:'');
}

// ── Screen renders ─────────────────────────────────────────────────────────────
function renderMode(){
  return `<div class="mode-screen">
    <div class="mode-title">ProofCheck — Annual General Meeting</div>
    <div class="mode-sub">Select the type of proofreading job to begin</div>
    <div class="mode-cards">
      <div class="mode-card" id="mc-fd">
        <div class="mc-icon">📄</div>
        <div class="mc-name">First Draft Check</div>
        <div class="mc-desc">Upload both Proxy Card and Notice & Access for a full cross-document check. Verifies all critical fields match exactly.</div>
        <div class="mc-tag tag-fd">New Job</div>
      </div>
      <div class="mode-card" id="mc-cr">
        <div class="mc-icon">🔄</div>
        <div class="mc-name">Change Round</div>
        <div class="mc-desc">Upload updated document + markup (C1, C2, C3...). Verifies changes applied correctly and nothing else accidentally changed.</div>
        <div class="mc-tag tag-cr">C1 · C2 · C3</div>
      </div>
    </div>
  </div>`;
}

function renderUpload(){
  const isFD=S.mode==='firstdraft';
  const canRun=S.f1&&S.f2&&S.apiKey.trim();
  const box=(n,label,file)=>`
    <div class="upload-box ${file?'filled':''}" id="box${n}">
      <div class="ub-icon">${file?'✅':n===1?'📄':'📋'}</div>
      <div class="ub-label">${label}</div>
      ${file?`<div class="ub-name">${file.name}</div><div class="ub-change">Click to change</div>`
             :`<div class="ub-hint">PDF · JPG · Word · TXT — click to browse</div>`}
    </div>`;
  return `
  <button class="back-btn" id="back-btn">← Back</button>
  <div class="upload-screen">
    <div class="upload-h">
      <h2>${isFD?'First Draft Check':'Change Round'}</h2>
      <p>${isFD?'Upload Proxy Card and Notice & Access for a full cross-document check.':'Upload the updated document and its markup to verify changes were applied.'}</p>
    </div>

    <div class="api-box">
      <div class="api-lbl">🔑 Groq API Key <span>— Free at console.groq.com</span></div>
      <div class="api-row">
        <input type="${S.showKey?'text':'password'}" class="api-input" id="api-input"
          placeholder="gsk_..." value="${S.apiKey}"/>
        <button class="api-toggle" id="api-toggle">${S.showKey?'🙈 Hide':'👁 Show'}</button>
      </div>
      <div class="api-hint">Get free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> → Sign up → API Keys → Create API Key</div>
    </div>

    <div class="upload-grid">
      ${box(1,isFD?'Proxy Card':'Updated Document',S.f1)}
      ${box(2,isFD?'Notice & Access':'Markup (C1 / C2 / C3)',S.f2)}
    </div>
    ${!isFD?`<div class="ci-box">
      <div class="ci-lbl">Change Instructions (from client email)</div>
      <textarea class="ci-ta" id="ci-ta" placeholder="e.g. Change director name from John Smith to Jonathan Smith. Update meeting date to April 20, 2026...">${S.changeInstr}</textarea>
    </div>`:''}
    <button class="run-btn" id="run-btn" ${canRun?'':'disabled'}>
      ${!S.apiKey.trim()?'🔑 Enter Groq API key to continue':(!S.f1||!S.f2)?'⬆ Upload both documents to continue':'⚡ Run AI Proofreading'}
    </button>
  </div>`;
}

function renderLoading(){
  const steps=[
    '📂 Reading uploaded documents...',
    '🔍 Extracting fields — Job number, Company, Dates...',
    '⚖️ Comparing documents with AI...',
    '🏷️ Classifying errors, queries and suggestions...',
    '📋 Building report...',
  ];
  return `<div class="loading-screen">
    <div class="spinner"></div>
    <div class="load-txt">Analysing documents...</div>
    <div class="load-sub">${S.loadMsg||'Please wait'}</div>
    <div class="load-steps">
      ${steps.map((s,i)=>`<div class="load-step" style="opacity:${i<=S.loadStep?1:0.3}">
        <div class="sdot ${i<=S.loadStep?'on':''}"></div><span>${s}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderReport(){
  const R=S.report;
  const isFD=S.mode==='firstdraft';
  const {errors,queries,suggestions}=R.summary;

  const sectionsHTML=SECTION_DEFS.map(def=>{
    const sec=R.sections[def.id]||{issues:[]};
    const issues=sec.issues||[];
    const rows=issues.map((iss,idx)=>{
      const uid=`${def.id}_${idx}`;
      const isOpen=S.open[uid];
      const tc=iss.type==='error'?'e':iss.type==='query'?'q':'s';
      const detailHTML=isOpen&&iss.detail?`<div class="ir-body">
        <div class="ir-compare">
          ${(iss.detail||[]).map(r=>`<div class="cr">
            <div class="cr-doc">${r.doc||r.d||''}</div>
            <div class="cr-val ${r.cls||r.c||''}">${(r.val||r.v||'').replace(/</g,'&lt;')}</div>
          </div>`).join('')}
        </div></div>`:'';
      return `<div class="issue-row ${isOpen?'open':''}" data-uid="${uid}">
        <div class="ir-top">
          <div class="ir-dot ird-${tc}"></div>
          <div class="ir-badge irb-${tc}">${iss.type==='error'?'Error':iss.type==='query'?'Query':'Suggestion'}</div>
          <div class="ir-desc">${iss.desc||iss.description||''}</div>
          <div class="ir-arr ${isOpen?'open':''}">▼</div>
        </div>${detailHTML}</div>`;
    }).join('');

    return `<div class="rpt-section">
      <div class="sec-hdr">
        <span class="sec-icon">${def.icon}</span>
        <span class="sec-name">${def.name}</span>
        <span class="sec-counts">${secBadges(issues)}</span>
      </div>${rows}</div>`;
  }).join('');

  const notesHTML=S.notes.map((n,i)=>`<div class="note-saved">
    <div class="ns-lbl">Note ${i+1}</div>${n}</div>`).join('');

  const jobMeta=[
    R.job_number?`Job #${R.job_number}`:'',
    R.company||'',
    R.meeting_date||'',
  ].filter(Boolean).join(' · ');

  return `
  <div class="rpt-top">
    <div class="rpt-left">
      <button class="back-btn" style="margin-bottom:0" id="back-btn">← New Check</button>
      <div class="mode-pill">
        <div class="mp-dot"></div>
        <div class="mp-lbl">${isFD?'First Draft Check':'Change Round'}</div>
        ${jobMeta?`<div class="mp-meta">&nbsp;· ${jobMeta}</div>`:''}
      </div>
    </div>
    <button class="toggle-btn ${S.showDoc?'on':''}" id="tog-doc">
      ${S.showDoc?'🙈 Hide Document':'👁 Show Document'}
    </button>
  </div>

  ${S.error?`<div class="err-box">❌ ${S.error}</div>`:''}

  <div class="summary-bar">
    <div class="sb sb-e"><div class="sb-num ne">${errors}</div>
      <div><div class="sb-lbl" style="color:var(--red)">Errors</div><div class="sb-sub">Must fix</div></div></div>
    <div class="sb sb-q"><div class="sb-num nq">${queries}</div>
      <div><div class="sb-lbl" style="color:var(--blue)">Queries</div><div class="sb-sub">Needs decision</div></div></div>
    <div class="sb sb-s"><div class="sb-num ns">${suggestions}</div>
      <div><div class="sb-lbl" style="color:var(--amber)">Suggestions</div><div class="sb-sub">Best practice</div></div></div>
  </div>

  <div class="legend">
    <strong style="color:var(--ink);font-size:11px">Key:</strong>
    <div class="leg"><div class="leg-dot" style="background:var(--red)"></div><span class="leg-lbl" style="color:var(--red)">Error</span><span>— must fix</span></div>
    <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div><span class="leg-lbl" style="color:var(--blue)">Query</span><span>— needs decision</span></div>
    <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div><span class="leg-lbl" style="color:var(--amber)">Suggestion</span><span>— best practice</span></div>
    <span class="leg-hint">Click any issue to expand ▼</span>
  </div>

  ${sectionsHTML}

  <div class="note-sec">
    <div class="sec-lbl-row">✍ Proofreader Notes</div>
    <textarea class="note-ta" id="note-ta" placeholder="Add a manual query or observation..."></textarea>
    <button class="note-add" id="note-add">+ Add Note</button>
    ${notesHTML}
  </div>`;
}

// ── Render & Bind ──────────────────────────────────────────────────────────────
function render(){
  const root=$('root');
  if(S.screen==='mode')    root.innerHTML=renderMode();
  if(S.screen==='upload')  root.innerHTML=renderUpload();
  if(S.screen==='loading') root.innerHTML=renderLoading();
  if(S.screen==='report')  root.innerHTML=renderReport();
  bind();
}

function bind(){
  // Mode
  const mfd=$('mc-fd'),mcr=$('mc-cr');
  if(mfd) mfd.onclick=()=>{S.mode='firstdraft';S.screen='upload';render();};
  if(mcr) mcr.onclick=()=>{S.mode='change';S.screen='upload';render();};

  // Back
  const back=$('back-btn');
  if(back) back.onclick=()=>{S.screen='mode';S.mode=null;S.f1=null;S.f2=null;S.report=null;S.error=null;render();};

  // API key input
  const apiInp=$('api-input');
  if(apiInp){
    apiInp.oninput=e=>{S.apiKey=e.target.value;localStorage.setItem('proofcheck_groq_key',S.apiKey);render();};
  }
  const apiTog=$('api-toggle');
  if(apiTog) apiTog.onclick=()=>{S.showKey=!S.showKey;render();};

  // Files
  const fi1=$('fi1'),fi2=$('fi2');
  if(fi1) fi1.onchange=e=>{if(e.target.files[0]){S.f1=e.target.files[0];render();}};
  if(fi2) fi2.onchange=e=>{if(e.target.files[0]){S.f2=e.target.files[0];render();}};
  const b1=$('box1'),b2=$('box2');
  if(b1&&fi1) b1.onclick=()=>{fi1.value='';fi1.click();};
  if(b2&&fi2) b2.onclick=()=>{fi2.value='';fi2.click();};

  // Change instructions
  const cita=$('ci-ta');
  if(cita) cita.oninput=e=>S.changeInstr=e.target.value;

  // Run
  const run=$('run-btn');
  if(run&&!run.disabled) run.onclick=async()=>{
    S.screen='loading'; render();
    try{
      S.report=await runAnalysis();
      S.screen='report';
    }catch(e){
      S.screen='upload';
      S.error='❌ '+e.message;
      // Show error on upload screen
      const errDiv=document.createElement('div');
      errDiv.className='err-box';
      errDiv.textContent=S.error;
      const runB=$('run-btn');
      if(runB) runB.before(errDiv);
    }
    render();
  };

  // Toggle doc view
  const tog=$('tog-doc');
  if(tog) tog.onclick=()=>{S.showDoc=!S.showDoc;render();};

  // Expand issues
  document.querySelectorAll('.issue-row[data-uid]').forEach(el=>{
    el.onclick=()=>{const uid=el.dataset.uid;S.open[uid]=!S.open[uid];render();};
  });

  // Notes
  const na=$('note-add');
  if(na) na.onclick=()=>{
    const ta=$('note-ta');
    if(ta&&ta.value.trim()){S.notes.push(ta.value.trim());render();}
  };
}

render();
</script>
</body>
</html>
