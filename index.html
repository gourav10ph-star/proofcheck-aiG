<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProofCheck AGM — Smart Proofreading Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f8f7f4;--card:#ffffff;--border:#e2ddd6;--ink:#1c1917;--muted:#78716c;--light:#f5f3ef;
  --error:#c0392b;--error-bg:#fdf2f1;--error-border:#f5c6c3;
  --query:#b7590a;--query-bg:#fef6ed;--query-border:#fcd9b0;
  --suggest:#1d6a9e;--suggest-bg:#eef5fb;--suggest-border:#b8d8f0;
  --ok:#1a6640;--ok-bg:#edf6f1;--ok-border:#a8dabb;--accent:#1c3f6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.6}
button,input,textarea,select{font-family:inherit}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--accent);color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo-icon{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.topbar-sub{font-size:11px;opacity:0.6;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.topbar-badge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:11px}
.main{flex:1;padding:32px;max-width:1200px;margin:0 auto;width:100%}

/* MODE SCREEN */
.mode-screen{display:flex;flex-direction:column;align-items:center;padding:48px 20px}
.mode-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--accent);margin-bottom:8px;text-align:center}
.mode-sub{color:var(--muted);font-size:14px;margin-bottom:48px;text-align:center}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%;max-width:640px}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:36px 28px;cursor:pointer;transition:all 0.2s;text-align:center;user-select:none}
.mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 32px rgba(28,63,110,0.12)}
.mode-icon{font-size:40px;margin-bottom:16px}
.mode-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--accent);margin-bottom:8px}
.mode-desc{font-size:12px;color:var(--muted);line-height:1.6}
.mode-tag{display:inline-block;margin-top:14px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.tag-new{background:#e8f0fe;color:#1a56c4}
.tag-change{background:#fef3e8;color:#b7590a}
.demo-btn{margin-top:44px;padding:14px 44px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.demo-btn:hover{background:#16325a;box-shadow:0 4px 20px rgba(28,63,110,0.3)}

/* UPLOAD SCREEN */
.upload-screen{max-width:820px;margin:0 auto}
.upload-header{margin-bottom:28px}
.upload-header h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);margin-bottom:6px}
.upload-header p{color:var(--muted);font-size:13px}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* ── UPLOAD BOX — key fix: label wraps hidden input ── */
.upload-box{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;display:block;user-select:none;-webkit-user-select:none}
.upload-box:hover{border-color:var(--accent);background:#f7f9fd}
.upload-box.filled{border-color:var(--ok);border-style:solid;background:var(--ok-bg)}
.upload-box input[type=file]{display:none}
.upload-box-icon{font-size:28px;margin-bottom:10px}
.upload-box-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.upload-box-hint{font-size:11px;color:var(--muted);margin-top:4px}
.upload-box-name{font-size:12px;color:var(--ok);font-weight:600;margin-top:8px;word-break:break-all}
.upload-box-change{font-size:10px;color:var(--muted);margin-top:4px}

.change-instr{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px}
.change-instr-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.change-instr textarea{width:100%;min-height:60px;padding:10px;background:var(--light);border:1px solid var(--border);border-radius:8px;font-size:12px;resize:vertical;outline:none;line-height:1.6;color:var(--ink)}
.change-instr textarea:focus{border-color:var(--accent)}
.change-instr textarea::placeholder{color:var(--muted);opacity:0.6}

.run-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.run-btn:hover{background:#16325a}
.run-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px;gap:16px}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--ink);font-weight:500}
.loading-sub{font-size:12px;color:var(--muted)}
.loading-steps{margin-top:8px;display:flex;flex-direction:column;gap:6px;align-items:center}
.loading-step{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);animation:pulse 1.5s ease-in-out infinite}
.step-dot.active{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* REPORT */
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:24px;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-indicator{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:24px;margin-left:12px}
.mode-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.mode-label{font-size:12px;font-weight:600;color:var(--accent)}
.mode-meta{font-size:11px;color:var(--muted)}
.report-layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}
.report-doc{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.report-doc-hdr{background:var(--accent);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.report-doc-hdr-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
.report-doc-hdr-meta{font-size:11px;opacity:0.65}
.doc-sec{border-bottom:1px solid var(--border);padding:20px 24px}
.doc-sec:last-child{border-bottom:none}
.doc-sec-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.doc-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.doc-text{font-size:13px;line-height:2;color:var(--ink)}

/* HIGHLIGHTS */
.hl{border-radius:3px;padding:1px 4px;cursor:pointer;transition:filter 0.15s;display:inline}
.hl-e{background:#ffd5d2;border-bottom:2px solid var(--error);color:#8b1a12}
.hl-q{background:#fde8cc;border-bottom:2px solid var(--query);color:#7a3a05}
.hl-s{background:#d0e8f7;border-bottom:2px solid var(--suggest);color:#0d4a7a}
.hl:hover{filter:brightness(0.9)}
.hn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:9px;font-weight:700;margin-left:1px;vertical-align:middle;flex-shrink:0}
.hn-e{background:var(--error);color:#fff}
.hn-q{background:var(--query);color:#fff}
.hn-s{background:var(--suggest);color:#fff}

/* PANEL */
.issues-panel{display:flex;flex-direction:column;gap:0;position:sticky;top:20px}
.panel-summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.panel-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--accent);margin-bottom:12px}
.summary-pills{display:flex;gap:8px;margin-bottom:12px}
.s-pill{flex:1;border-radius:8px;padding:10px 6px;text-align:center}
.s-pill-n{font-size:22px;font-weight:700;line-height:1}
.s-pill-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;opacity:0.8}
.pill-e{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.pill-q{background:var(--query-bg);color:var(--query);border:1px solid var(--query-border)}
.pill-s{background:var(--suggest-bg);color:var(--suggest);border:1px solid var(--suggest-border)}
.job-meta{background:var(--light);border-radius:8px;padding:11px;font-size:11px}
.jm-row{display:flex;justify-content:space-between;margin-bottom:3px}
.jm-row:last-child{margin-bottom:0}
.jm-val{color:var(--ink);font-weight:500;font-family:'IBM Plex Mono',monospace;font-size:11px}

.i-tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px 10px 0 0;overflow:hidden;border-bottom:none}
.i-tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;transition:all 0.15s;border-bottom:2px solid transparent;color:var(--muted)}
.i-tab.te{background:var(--error-bg);color:var(--error);border-bottom-color:var(--error)}
.i-tab.tq{background:var(--query-bg);color:var(--query);border-bottom-color:var(--query)}
.i-tab.ts{background:var(--suggest-bg);color:var(--suggest);border-bottom-color:var(--suggest)}

.i-list{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;max-height:400px;overflow-y:auto}
.i-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.i-item:last-child{border-bottom:none}
.i-item:hover,.i-item.active{background:var(--light)}
.i-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.i-num{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.in-e{background:var(--error);color:#fff}
.in-q{background:var(--query);color:#fff}
.in-s{background:var(--suggest);color:#fff}
.i-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;border-radius:4px}
.ib-e{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.ib-q{background:var(--query-bg);color:var(--query);border:1px solid var(--query-border)}
.ib-s{background:var(--suggest-bg);color:var(--suggest);border:1px solid var(--suggest-border)}
.i-sec{font-size:10px;color:var(--muted)}
.i-desc{font-size:12px;color:var(--ink);line-height:1.5;margin-bottom:6px}
.i-detail{font-size:11px;color:var(--muted);background:var(--light);border-radius:5px;padding:7px 9px;font-family:'IBM Plex Mono',monospace;line-height:1.7;white-space:pre-wrap}
.va{color:var(--error);font-weight:600}
.vb{color:var(--ok);font-weight:600}

.note-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px}
.note-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.note-ta{width:100%;min-height:64px;padding:9px;background:var(--light);border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--ink);resize:vertical;outline:none;line-height:1.5}
.note-ta:focus{border-color:var(--accent)}
.note-ta::placeholder{color:var(--muted);opacity:0.55}
.note-add{margin-top:7px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background 0.15s}
.note-add:hover{background:#16325a}
.note-saved{margin-top:8px;background:var(--query-bg);border-left:3px solid var(--query);border-radius:5px;padding:8px 10px;font-size:12px;color:var(--ink)}
.note-saved-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}

.hist-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px}
.hist-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-round{background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:600;flex-shrink:0;font-family:'IBM Plex Mono',monospace;height:fit-content;margin-top:2px}
.hist-txt{color:var(--ink);line-height:1.5}
.hist-time{font-size:10px;color:var(--muted);margin-top:1px}

@media(max-width:860px){.report-layout{grid-template-columns:1fr}.issues-panel{position:static}.mode-cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">📋</div>
      <div>
        <div class="topbar-title">ProofCheck AGM</div>
        <div class="topbar-sub">Smart Proofreading Tool</div>
      </div>
    </div>
    <div class="topbar-badge">PROTOTYPE v1.0</div>
  </div>
  <div class="main" id="root"></div>
</div>

<!-- Hidden real file inputs — outside the dynamic content so they persist -->
<input type="file" id="fi1" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display:none"/>
<input type="file" id="fi2" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display:none"/>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  screen: 'mode',   // mode | upload | loading | report
  mode: null,       // firstdraft | change
  f1: null, f2: null,
  notes: [],
  tab: 'error',
  activeIssue: null,
  loadStep: 0,
};

// ── Dummy data ─────────────────────────────────────────────────────────────────
const JOB = { number:'78432', company:'Acme Corporation', meeting:'April 15, 2026', time:'10:00 a.m. ET', round:'First Draft' };

const ISSUES = [
  { id:1, type:'error', section:'Header',
    desc:'Job number mismatch between Proxy Card and Notice & Access',
    detail:'Proxy Card:        #78432\nNotice & Access:   #78433' },
  { id:2, type:'error', section:'Meeting Details',
    desc:'Meeting date differs between Proxy Card and Notice & Access',
    detail:'Proxy Card:        April 15, 2026\nNotice & Access:   April 16, 2026' },
  { id:3, type:'error', section:'Agenda',
    desc:'Proposal 2 auditor name does not match between documents',
    detail:'Proxy Card:        "Ernst & Young LLP"\nNotice & Access:   "Ernst and Young LLP"' },
  { id:4, type:'error', section:'Directors',
    desc:'Director name spelling inconsistency across both documents',
    detail:'Proxy Card:        "Jonathan P. Williams"\nNotice & Access:   "Jonathon P. Williams"' },
  { id:5, type:'error', section:'Meeting Materials',
    desc:'Form 10-K present in Proxy Card but missing from Notice & Access',
    detail:'Proxy Card:        Notice, Proxy Statement and Form 10-K\nNotice & Access:   Notice and Proxy Statement' },
  { id:6, type:'query', section:'Agenda',
    desc:'Vote recommendation capitalisation inconsistent — "FOR" vs "For" used in different places. Confirm standard.',
    detail:'Page 1:   "FOR"  (all caps)\nPage 3:   "For"  (title case)\nPlease confirm which format to use throughout' },
  { id:7, type:'query', section:'Directors',
    desc:'Director term written differently — confirm preferred format between documents',
    detail:'Proxy Card:        "1 Year"\nNotice & Access:   "One Year"\nPlease confirm which format to standardise' },
  { id:8, type:'query', section:'Agenda',
    desc:'Proposal 3 text wraps to two lines in Proxy Card — should this be condensed to a single line?',
    detail:'"To approve the compensation of the\nCompany\'s named executive officers"\nQuery: condense to single line?' },
  { id:9, type:'suggest', section:'Meeting Details',
    desc:'Meeting time format inconsistency — recommend standardising to one format throughout',
    detail:'Header:   "10:00 a.m."\nFooter:   "10:00 AM"\nRecommend: use "a.m." throughout (legal standard)' },
  { id:10, type:'suggest', section:'Voting',
    desc:'Proposal 3 may be missing ABSTAIN voting option — verify correct options for this proposal type',
    detail:'Proposal 3 currently shows: FOR / AGAINST\nExpected for say-on-pay:     FOR / AGAINST / ABSTAIN\nPlease verify' },
];

const HISTORY = [
  { round:'C2', txt:'Meeting location updated — verified correct in both documents', time:'2 days ago' },
  { round:'C1', txt:'Company name corrected from "ACME Corp" to "Acme Corporation"', time:'4 days ago' },
  { round:'Draft', txt:'First draft checked — 6 errors, 4 queries raised', time:'6 days ago' },
];

// ── Helpers ────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const errors = () => ISSUES.filter(i=>i.type==='error');
const queries = () => ISSUES.filter(i=>i.type==='query');
const suggests = () => ISSUES.filter(i=>i.type==='suggest');

function hl(text, id, type) {
  const cls = type==='error'?'hl-e':type==='query'?'hl-q':'hl-s';
  const ncls = type==='error'?'hn-e':type==='query'?'hn-q':'hn-s';
  return `<span class="hl ${cls}" data-id="${id}">${text}<span class="hn ${ncls}">${id}</span></span>`;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const root = $('root');
  if (S.screen==='mode')    root.innerHTML = renderMode();
  if (S.screen==='upload')  root.innerHTML = renderUpload();
  if (S.screen==='loading') root.innerHTML = renderLoading();
  if (S.screen==='report')  root.innerHTML = renderReport();
  bind();
}

function renderMode() {
  return `
  <div class="mode-screen">
    <div class="mode-title">ProofCheck AGM</div>
    <div class="mode-sub">Select the type of proofreading job to begin</div>
    <div class="mode-cards">
      <div class="mode-card" id="mc-fd">
        <div class="mode-icon">📄</div>
        <div class="mode-name">First Draft Check</div>
        <div class="mode-desc">Upload both Proxy Card and Notice &amp; Access for a full cross-document check. Verifies all critical fields match exactly between both documents.</div>
        <div class="mode-tag tag-new">New Job</div>
      </div>
      <div class="mode-card" id="mc-cr">
        <div class="mode-icon">🔄</div>
        <div class="mode-name">Change Round</div>
        <div class="mode-desc">Upload updated document + markup (C1, C2, C3...). Verifies change was applied correctly everywhere and nothing else accidentally changed.</div>
        <div class="mode-tag tag-change">C1 · C2 · C3</div>
      </div>
    </div>
    <button class="demo-btn" id="demo-btn">▶&nbsp; Run Demo — First Draft Check</button>
  </div>`;
}

function renderUpload() {
  const isFD = S.mode === 'firstdraft';
  const label1 = isFD ? 'Proxy Card' : 'Updated Document';
  const label2 = isFD ? 'Notice & Access' : 'Markup (C1 / C2 / C3)';
  const hint = 'PDF · JPG · Word — click to browse';

  const boxHTML = (n, label, fileObj) => `
    <div class="upload-box ${fileObj?'filled':''}" id="box${n}">
      <div class="upload-box-icon">${fileObj ? '✅' : n===1 ? '📄' : '📋'}</div>
      <div class="upload-box-label">${label}</div>
      ${fileObj
        ? `<div class="upload-box-name">${fileObj.name}</div><div class="upload-box-change">Click to change file</div>`
        : `<div class="upload-box-hint">${hint}</div>`
      }
    </div>`;

  const canRun = S.f1 && S.f2;

  return `
  <button class="back-btn" id="back-btn">← Back</button>
  <div class="upload-screen">
    <div class="upload-header">
      <h2>${isFD ? 'First Draft Check' : 'Change Round'}</h2>
      <p>${isFD ? 'Upload Proxy Card and Notice & Access to run a full cross-document check.' : 'Upload the updated document and its markup file to verify changes.'}</p>
    </div>
    <div class="upload-grid">
      ${boxHTML(1, label1, S.f1)}
      ${boxHTML(2, label2, S.f2)}
    </div>
    ${!isFD ? `
    <div class="change-instr">
      <div class="change-instr-label">Change Instructions (from client email)</div>
      <textarea placeholder="e.g. Change director name from John Smith to Jonathan Smith. Update meeting date to April 20, 2026..."></textarea>
    </div>` : ''}
    <button class="run-btn" id="run-btn" ${canRun?'':'disabled'}>
      ${canRun ? '⚡ Run AI Proofreading' : '⬆ Upload both documents to continue'}
    </button>
  </div>`;
}

function renderLoading() {
  const steps = [
    '📂 Reading uploaded documents...',
    '🔍 Extracting fields — Job number, Company, Dates...',
    '⚖️ Comparing Proxy Card vs Notice & Access...',
    '🏷️ Classifying Errors and Queries...',
    '📋 Building web report...',
  ];
  return `
  <div class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Analysing documents...</div>
    <div class="loading-sub">Please wait while AI checks your documents</div>
    <div class="loading-steps">
      ${steps.map((s,i)=>`
        <div class="loading-step">
          <div class="step-dot ${i<=S.loadStep?'active':''}" style="animation-delay:${i*0.3}s"></div>
          <span style="opacity:${i<=S.loadStep?1:0.35}">${s}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

// ── Bind events ────────────────────────────────────────────────────────────────
function bind() {

  // Mode cards
  const mc_fd = $('mc-fd');
  const mc_cr = $('mc-cr');
  if (mc_fd) mc_fd.onclick = () => { S.mode='firstdraft'; S.screen='upload'; render(); };
  if (mc_cr) mc_cr.onclick = () => { S.mode='change'; S.screen='upload'; render(); };

  // Demo button
  const demoBtn = $('demo-btn');
  if (demoBtn) demoBtn.onclick = () => {
    S.mode='firstdraft'; S.screen='loading'; S.loadStep=0; render();
    const interval = setInterval(()=>{ S.loadStep++; render(); if(S.loadStep>=4) clearInterval(interval); },500);
    setTimeout(()=>{ S.screen='report'; render(); }, 3000);
  };

  // Back button
  const backBtn = $('back-btn');
  if (backBtn) backBtn.onclick = () => { S.screen='mode'; S.mode=null; S.f1=null; S.f2=null; render(); };

  // File inputs — attach fresh listeners every render
  const fi1 = $('fi1');
  const fi2 = $('fi2');
  if (fi1) fi1.onchange = e => { if(e.target.files[0]){ S.f1=e.target.files[0]; render(); } };
  if (fi2) fi2.onchange = e => { if(e.target.files[0]){ S.f2=e.target.files[0]; render(); } };

  // Upload box clicks — programmatically open file dialog
  const box1 = $('box1');
  const box2 = $('box2');
  if (box1 && fi1) box1.onclick = () => { fi1.value=''; fi1.click(); };
  if (box2 && fi2) box2.onclick = () => { fi2.value=''; fi2.click(); };

  // Run button
  const runBtn = $('run-btn');
  if (runBtn && !runBtn.disabled) {
    runBtn.onclick = () => {
      S.screen='loading'; S.loadStep=0; render();
      const interval = setInterval(()=>{ S.loadStep++; render(); if(S.loadStep>=4) clearInterval(interval); },500);
      setTimeout(()=>{ S.screen='report'; render(); }, 3000);
    };
  }

  // Tabs
  const te=$('tab-e'), tq=$('tab-q'), ts=$('tab-s');
  if(te) te.onclick=()=>{ S.tab='error'; render(); };
  if(tq) tq.onclick=()=>{ S.tab='query'; render(); };
  if(ts) ts.onclick=()=>{ S.tab='suggest'; render(); };

  // Issue items — click to highlight
  document.querySelectorAll('.i-item[data-id]').forEach(el=>{
    el.onclick=()=>{
      const id=parseInt(el.dataset.id);
      S.activeIssue=id;
      render();
      const hlEl=document.querySelector(`.hl[data-id="${id}"]`);
      if(hlEl) hlEl.scrollIntoView({behavior:'smooth',block:'center'});
    };
  });

  // Highlights — click to show issue
  document.querySelectorAll('.hl[data-id]').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const id=parseInt(el.dataset.id);
      const iss=ISSUES.find(i=>i.id===id);
      if(!iss) return;
      S.tab = iss.type==='suggest'?'suggest':iss.type;
      S.activeIssue=id;
      render();
      const iEl=document.querySelector(`.i-item[data-id="${id}"]`);
      if(iEl) iEl.scrollIntoView({behavior:'smooth',block:'center'});
    };
  });

  // Add note
  const noteAdd=$('note-add');
  if(noteAdd) noteAdd.onclick=()=>{
    const ta=$('note-ta');
    if(ta&&ta.value.trim()){ S.notes.push(ta.value.trim()); render(); }
  };
}

render();
</script>
